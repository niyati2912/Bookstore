<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        
        body {
            font-family: 'Orbitron', sans-serif;
            background: url('https://source.unsplash.com/1600x900/?cyberpunk,city,neon') no-repeat center center/cover;
            color: #0ff;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            backdrop-filter: blur(5px);
            position: relative;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
        }
        
        .container {
            position: relative;
            width: 80%;
            max-width: 500px;
            padding: 40px;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.85);
            box-shadow: 0 0 40px cyan;
            backdrop-filter: blur(15px);
            animation: neonGlow 1.5s infinite alternate;
        }
        
        @keyframes neonGlow {
            0% { box-shadow: 0 0 20px cyan; }
            100% { box-shadow: 0 0 40px cyan, 0 0 60px blue; }
        }
        
        h1 {
            font-size: 2.5em;
            text-shadow: 0 0 20px cyan;
            margin-bottom: 20px;
        }
        
        form {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        input {
            width: 80%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 5px;
            background: rgba(0, 255, 255, 0.2);
            color: #0ff;
            font-size: 1.2em;
            text-align: center;
            box-shadow: 0 0 15px cyan;
        }
        
        input:focus {
            outline: none;
            box-shadow: 0 0 20px cyan;
        }
        
        input[type="submit"] {
            background: linear-gradient(135deg, #00ffff, #0088ff);
            color: black;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 25px cyan;
        }
        
        input[type="submit"]:hover {
            background: linear-gradient(135deg, #00e6e6, #0077e6);
            box-shadow: 0 0 35px cyan;
            transform: scale(1.1);
        }
        
        a {
            margin-top: 20px;
            font-size: 1.2em;
            color: #0ff;
            text-shadow: 0 0 15px cyan;
            text-decoration: none;
        }
        
        a:hover {
            text-shadow: 0 0 25px cyan;
        }
    </style>
</head>
<body>
    <header>
        <h1>Register</h1>
    </header>
    <div class="container">
        <form method="POST" action="{{ url_for('register') }}">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required><br>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required><br>
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required><br>
            <button type="submit">Register</button>
        </form>
        <nav>
            <a href="{{ url_for('home') }}">Home</a>
            <a href="{{ url_for('login') }}">Login</a>
        </nav>
    </div>
</body>
</html>
