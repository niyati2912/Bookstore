<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap');
        
        body {
            font-family: 'Playfair Display', serif;
            background: url('https://source.unsplash.com/1600x900/?bookshelf,library') no-repeat center center/cover;
            color: #333;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            backdrop-filter: blur(5px);
            position: relative;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
        }
        
        .container {
            position: relative;
            width: 80%;
            max-width: 500px;
            padding: 40px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.85);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(15px);
            animation: softGlow 1.5s infinite alternate;
        }

        @keyframes softGlow {
            0% { box-shadow: 0 0 20px rgba(0, 0, 0, 0.2); }
            100% { box-shadow: 0 0 40px rgba(0, 0, 0, 0.3); }
        }
        
        h1 {
            font-size: 2.5em;
            color: #d67d3d; /* Warm goldish color */
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
            margin-bottom: 20px;
        }
        
        form {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        input {
            width: 80%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            background: #f9f9f9;
            color: #5a3d26; /* Deep autumn brown */
            font-size: 1.2em;
            text-align: center;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.1);
        }
        
        input:focus {
            outline: none;
            box-shadow: 0 0 10px #5a3d26; /* Autumn brown focus */
        }
        
        input[type="submit"] {
            background: linear-gradient(135deg, #f4a261, #e76f51); /* Autumn gradient */
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
        }
        
        input[type="submit"]:hover {
            background: linear-gradient(135deg, #e76f51, #f4a261); 
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.2);
            transform: scale(1.05);
        }
        
        a {
            margin-top: 20px;
            font-size: 1.2em;
            color: #5a3d26; 
            text-decoration: none;
            transition: 0.3s;
        }
        
        a:hover {
            color: #e76f51; 
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Register</h1>
        <form method="POST">
            <input type="text" name="username" placeholder="Username" required><br>
            <input type="email" name="email" placeholder="Email" required><br>
            <input type="password" name="password" placeholder="Password" required><br>
            <input type="submit" value="Register">
        </form>
        <a href="{{ url_for('login') }}">Already have an account? Login</a>
    </div>
</body>
</html>
