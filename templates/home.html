<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap');
        
        body {
            font-family: 'Playfair Display', serif;
            background: url('https://source.unsplash.com/1600x900/?bookshelf,library') no-repeat center center/cover;
            color: #333;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            position: relative;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
        }
        
        .container {
            position: relative;
            width: 80%;
            max-width: 900px;
            padding: 50px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(8px);
        }
        
        h1 {
            font-size: 3em;
            color: #333;
            margin-bottom: 20px;
        }
        
        p {
            font-size: 1.5em;
            margin: 20px 0;
            color: #555;
        }
        
        .buttons {
            margin-top: 30px;
        }
        
        .btn {
            display: inline-block;
            padding: 15px 30px;
            font-size: 20px;
            font-weight: bold;
            color: #fff;
            background: #ff6347;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            transition: 0.3s;
        }
        
        .btn:hover {
            background: #f8b400;
            transform: scale(1.05);
        }

        nav a {
            color: #fff;
            margin: 15px;
            font-weight: bold;
            text-decoration: none;
            font-size: 1.2em;
        }

        nav a:hover {
            color: #f8b400;
        }

        footer {
            margin-top: 40px;
            font-size: 1em;
            color: #fff;
        }
        
    </style>
</head>
<body>
    <header>
        <h1>Welcome to BookNama</h1>
    </header>
    <div class="container">
        <p>Your favorite place to explore books and buy them with ease. Discover our collection today!</p>
        <div class="buttons">
            <a href="{{ url_for('login') }}" class="btn">Login</a>
            <a href="{{ url_for('register') }}" class="btn">Register</a>

        </div>
    </div>
    <footer>
        <p>&copy; 2025 BookNama, All Rights Reserved.</p>
    </footer>
</body>
</html>
