<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        
        body {
            font-family: 'Orbitron', sans-serif;
            background: url('https://tse3.mm.bing.net/th?id=OIP.vbgKIwzgQf_gi2kHoBzBQgHaEK&pid=Api&P=0&h=180') no-repeat center center/cover;
            color: #0ff;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            
            position: relative;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            
        }
        
        .container {
            position: relative;
            width: 80%;
            max-width: 900px;
            padding: 50px;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.8);
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            animation: neonGlow 1.5s infinite alternate;
        }
        
        @keyframes neonGlow {
            0% { box-shadow: 0 0 30px cyan; }
            100% { box-shadow: 0 0 50px cyan, 0 0 80px blue; }
        }
        
        h1 {
            font-size: 3em;
            text-shadow: 0 0 30px cyan;
            margin-bottom: 10px;
        }
        
        p {
            font-size: 1.5em;
            margin: 20px 0;
        }
        
        .buttons {
            margin-top: 30px;
        }
        
        .btn {
            display: inline-block;
            padding: 15px 30px;
            font-size: 20px;
            font-weight: bold;
            color: black;
            background: linear-gradient(135deg, #00ffff, #0088ff);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            transition: 0.3s;
            box-shadow: 0 0 20px cyan;
        }
        
        .btn:hover {
            background: linear-gradient(135deg, #00e6e6, #0077e6);
            box-shadow: 0 0 30px cyan;
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <header>
        <h1>{{ heading }}</h1>
    </header>
    <nav>
        <a href="{{ url_for('login') }}">Login</a>
        <a href="{{ url_for('register') }}">Register</a>
        <a href="{{ url_for('dashboard') }}">Dashboard</a>
        <a href="{{ url_for('logout') }}">Logout</a>
    </nav>
</body>
</html>
