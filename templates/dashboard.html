<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">
</head>
<body>
    <header>
        <h1>Welcome, {{ username }}</h1>
        <div class="cart-icon">
            <a href="{{ url_for('cart') }}">
                <img src="{{ url_for('static', filename='cart-icon.png') }}" alt="Cart" width="30" height="30">
            </a>
        </div>
    </header>
    <nav>
        <a href="{{ url_for('home') }}">Home</a>
        <a href="{{ url_for('logout') }}">Logout</a>
    </nav>
    <div class="search-bar">
        <input type="text" placeholder="Search for books...">
        <button>
            <img src="{{ url_for('static', filename='search-icon.png') }}" alt="Search" width="20" height="20">
        </button>
    </div>
    <div class="genres">
        <a href="{{ url_for('genre', genre='fiction') }}">Fiction</a>
        <a href="{{ url_for('genre', genre='non-fiction') }}">Non-Fiction</a>
        <a href="{{ url_for('genre', genre='mystery') }}">Mystery</a>
        <a href="{{ url_for('genre', genre='fantasy') }}">Fantasy</a>
        <a href="{{ url_for('genre', genre='science-fiction') }}">Science Fiction</a>
    </div>
</body>
</html>
