<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap');

        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f4e1d2; /* Light warm background */
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            background-color: #b35e34; /* Warm brown color */
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        header h1 {
            font-size: 1.8em;
            font-weight: 700;
            margin: 0;
        }

        .cart-icon img {
            cursor: pointer;
            width: 30px;
            height: 30px;
        }

        nav {
            width: 100%;
            background-color: #d87f4f; /* Pumpkin orange */
            padding: 12px 0;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        nav a {
            color: #fff;
            margin: 0 20px;
            font-size: 1.1em;
            text-decoration: none;
            text-transform: uppercase;
            font-weight: bold;
            transition: color 0.3s ease;
        }

        nav a:hover {
            color: #f39c12;
        }

        .search-bar {
            width: 90%;
            max-width: 600px;
            margin-top: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #fff;
            padding: 10px 20px;
            border-radius: 25px;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
        }

        .search-bar input {
            border: none;
            width: 80%;
            padding: 12px 20px;
            font-size: 1em;
            border-radius: 25px;
            outline: none;
            transition: border 0.3s ease;
            background-color: #f7d0a3; /* Soft beige */
        }

        .search-bar input:focus {
            border: 2px solid #e67e22;
        }

        .search-bar button {
            background-color: #f39c12; /* Warm golden yellow */
            border: none;
            padding: 12px 20px;
            cursor: pointer;
            border-radius: 25px;
            transition: background-color 0.3s ease;
        }

        .search-bar button:hover {
            background-color: #e67e22; /* Darker orange */
        }

        .genres {
            margin-top: 50px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 25px;
        }

        .genres a {
            background-color: #e67e22; /* Fall orange */
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            font-size: 1.2em;
            border-radius: 25px;
            transition: all 0.3s ease;
        }

        .genres a:hover {
            background-color: #c4302b; /* Red fall leaves color */
            transform: scale(1.05);
        }

        .pinterest-links {
            margin-top: 40px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }

        .pinterest-links a {
            background-color: #e60023; /* Deep red */
            color: white;
            padding: 15px 25px;
            text-decoration: none;
            font-size: 1.2em;
            border-radius: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s ease;
        }

        .pinterest-links a:hover {
            background-color: #c4302b; /* Slightly darker red */
            transform: scale(1.05);
        }

        .pinterest-links img {
            width: 30px;
            height: 30px;
        }

        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 15px;
            font-size: 0.9em;
        }

    </style>
</head>
<body>
    <header>
        <h1>Welcome, {{ username }}</h1>
        <div class="cart-icon">
            <a href="{{ url_for('cart') }}">
                <img src="{{ url_for('static', filename='cart-icon.png') }}" alt="Cart">
            </a>
        </div>
    </header>

    <nav>
        <a href="{{ url_for('logout') }}">Logout</a>
    </nav>

    <div class="search-bar">
        <input type="text" placeholder="Search for books...">
        <button>
            <img src="{{ url_for('static', filename='search-icon.png') }}" alt="Search" width="20" height="20">
        </button>
    </div>

    <div class="genres">
        <a href="{{ url_for('genre', genre='fiction') }}">Fiction</a>
        <a href="{{ url_for('genre', genre='non-fiction') }}">Non-Fiction</a>
        <a href="{{ url_for('genre', genre='mystery') }}">Mystery</a>
        <a href="{{ url_for('genre', genre='fantasy') }}">Fantasy</a>
        <a href="{{ url_for('genre', genre='science-fiction') }}">Science Fiction</a>
    </div>

    <!-- Pinterest Links Section -->
    <div class="pinterest-links">
        <a href="https://www.pinterest.com/search/pins/?q=fiction%20books" target="_blank">
            <img src="https://upload.wikimedia.org/wikipedia/commons/6/64/Pinterest_Logo_2015.svg" alt="Pinterest"> Fiction Books
        </a>
        <a href="https://www.pinterest.com/search/pins/?q=non-fiction%20books" target="_blank">
            <img src="https://upload.wikimedia.org/wikipedia/commons/6/64/Pinterest_Logo_2015.svg" alt="Pinterest"> Non-Fiction Books
        </a>
        <a href="https://www.pinterest.com/search/pins/?q=mystery%20books" target="_blank">
            <img src="https://upload.wikimedia.org/wikipedia/commons/6/64/Pinterest_Logo_2015.svg" alt="Pinterest"> Mystery Books
        </a>
        <a href="https://www.pinterest.com/search/pins/?q=fantasy%20books" target="_blank">
            <img src="https://upload.wikimedia.org/wikipedia/commons/6/64/Pinterest_Logo_2015.svg" alt="Pinterest"> Fantasy Books
        </a>
        <a href="https://www.pinterest.com/search/pins/?q=science%20fiction%20books" target="_blank">
            <img src="https://upload.wikimedia.org/wikipedia/commons/6/64/Pinterest_Logo_2015.svg" alt="Pinterest"> Science Fiction Books
        </a>
    </div>

    <footer>
        <p>&copy; 2025 BookStore. All Rights Reserved.</p>
    </footer>
</body>
</html>
